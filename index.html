<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Generator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="page">

    <!-- Hero Header -->
    <header class="hero">
      <p class="eyebrow">RECIPE GENERATOR</p>
      <h1 class="headline">
        One ingredient,<br>
        <em>endless possibilities.</em>
      </h1>
      <p class="subhead">Type anything in your kitchen — then set the style.</p>
    </header>

    <main>

      <!-- Search bar -->
      <div class="search-row">
        <input
          type="text"
          id="ingredient"
          class="search-input"
          placeholder="e.g. chicken thighs, lemon, chickpeas…"
          autocomplete="off"
        />
        <button class="btn-generate" id="generateBtn" onclick="generateRecipe()">
          <span id="btnText">Generate Recipes</span>
          <span id="btnLoader" class="loader hidden"></span>
        </button>
      </div>

      <!-- Filters -->
      <div class="filters-panel">
        <p class="filters-label">COOKING STYLE — PICK ANY COMBINATION</p>

        <div class="filters-grid">

          <!-- Cuisine -->
          <div class="filter-group">
            <p class="group-label">CUISINE</p>
            <div class="pills" id="pillsCuisine">
              <button class="pill" data-group="cuisine" data-value="Italian">🍕 Italian</button>
              <button class="pill" data-group="cuisine" data-value="Asian">🥢 Asian</button>
              <button class="pill" data-group="cuisine" data-value="Mexican">🌮 Mexican</button>
              <button class="pill" data-group="cuisine" data-value="Mediterranean">🫒 Mediterranean</button>
              <button class="pill" data-group="cuisine" data-value="American">🍔 American</button>
              <button class="pill" data-group="cuisine" data-value="Indian">🍛 Indian</button>
              <button class="pill" data-group="cuisine" data-value="French">🥐 French</button>
              <button class="pill" data-group="cuisine" data-value="Middle Eastern">🧆 Middle Eastern</button>
            </div>
          </div>

          <!-- Dietary -->
          <div class="filter-group">
            <p class="group-label">DIETARY</p>
            <div class="pills" id="pillsDietary">
              <button class="pill" data-group="dietary" data-value="Vegan">🌱 Vegan</button>
              <button class="pill" data-group="dietary" data-value="Vegetarian">🥦 Vegetarian</button>
              <button class="pill" data-group="dietary" data-value="Keto">🥑 Keto</button>
              <button class="pill" data-group="dietary" data-value="Gluten-Free">🌾 Gluten-free</button>
              <button class="pill" data-group="dietary" data-value="Dairy-Free">🥛 Dairy-free</button>
              <button class="pill" data-group="dietary" data-value="Low-Carb">📉 Low-carb</button>
            </div>
          </div>

          <!-- Meal Type -->
          <div class="filter-group">
            <p class="group-label">MEAL TYPE</p>
            <div class="pills" id="pillsMeal">
              <button class="pill" data-group="meal" data-value="Breakfast">🍳 Breakfast</button>
              <button class="pill" data-group="meal" data-value="Lunch">☀️ Lunch</button>
              <button class="pill" data-group="meal" data-value="Dinner">🌙 Dinner</button>
              <button class="pill" data-group="meal" data-value="Snack">🍿 Snack</button>
              <button class="pill" data-group="meal" data-value="Dessert">🍮 Dessert</button>
              <button class="pill" data-group="meal" data-value="Appetizer">🥗 Appetizer</button>
            </div>
          </div>

          <!-- Cooking Method -->
          <div class="filter-group">
            <p class="group-label">COOKING METHOD</p>
            <div class="pills" id="pillsMethod">
              <button class="pill" data-group="method" data-value="Grilled">🔥 Grilled</button>
              <button class="pill" data-group="method" data-value="Baked">🫙 Baked</button>
              <button class="pill" data-group="method" data-value="Sautéed">🍳 Stir-fried</button>
              <button class="pill" data-group="method" data-value="Roasted">♨️ Roasted</button>
              <button class="pill" data-group="method" data-value="Slow Cooked">🕐 Slow-cooked</button>
              <button class="pill" data-group="method" data-value="Raw / No-Cook">🥬 Raw / No-cook</button>
            </div>
          </div>

        </div>
      </div>

      <!-- Result -->
      <section id="result" class="result-card hidden">
        <div class="result-header">
          <h2 id="recipeName"></h2>
          <div class="result-badges" id="resultBadges"></div>
          <div class="result-meta" id="resultMeta"></div>
        </div>
        <div class="result-body">
          <div class="result-col">
            <h3>Ingredients</h3>
            <ul id="ingredientsList"></ul>
          </div>
          <div class="result-col">
            <h3>Instructions</h3>
            <ol id="instructionsList"></ol>
          </div>
        </div>
        <div class="result-actions">
          <button class="btn-action" onclick="saveRecipe()">💾 Save</button>
          <button class="btn-action" onclick="generateRecipe()">🔄 Another</button>
          <button class="btn-action" onclick="shareRecipe()">📤 Share</button>
        </div>
      </section>

      <!-- Saved Recipes -->
      <section id="savedSection" class="saved-card hidden">
        <div class="saved-header">
          <h3>Saved Recipes</h3>
          <button class="btn-icon" onclick="toggleSaved()">✕</button>
        </div>
        <div id="savedList"></div>
      </section>

    </main>

    <footer>
      <p>✨ One ingredient. Endless possibilities.</p>
    </footer>

  </div>

  <!-- Floating saved toggle -->
  <button class="btn-saved-toggle" onclick="toggleSaved()" title="Saved recipes">
    📚 <span id="savedCount">0</span>
  </button>

  <!-- Toast -->
  <div id="toastEl" class="toast"></div>

  <script src="script.js"></script>
</body>
</html>
